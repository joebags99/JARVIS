<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JARVIS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="particles"></canvas>

    <div id="header" class="drag-handle">
      <div id="title">
        <span class="core-rig"><span class="reticle"></span><span id="core"></span></span>
        J A R V I S
      </div>
      <div id="header-actions">
        <button id="notif-btn" class="icon-btn" title="Notifications">
          &#128276;<span id="notif-badge" class="notif-badge hidden">0</span>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
        <button id="dials-btn" class="icon-btn" title="Voice dials">&#127899;</button>
        <button id="clear-btn" class="icon-btn" title="Clear chat">&#8634;</button>
        <button id="close-btn" class="icon-btn" title="Close">&#10005;</button>
      </div>
    </div>

    <!-- Notifications: durable history of proactive nudges (meeting alerts,
         email pings, vault "still open?" callbacks) — a tray balloon
         disappears the moment it's dismissed, this doesn't. -->
    <div id="notif-panel" class="hidden" aria-hidden="true">
      <div id="notif-head">
        <span class="dials-title">Notifications</span>
        <div class="dials-head-actions">
          <button id="notif-close" class="dials-link" title="Close">&#10005;</button>
        </div>
      </div>
      <div id="notif-list"></div>
    </div>

    <!-- Voice dials: drag a slider to retune JARVIS instantly, no LLM call. -->
    <div id="dials-panel" class="hidden" aria-hidden="true">
      <div id="dials-head">
        <span class="dials-title">Voice Dials</span>
        <div class="dials-head-actions">
          <button id="dials-save" class="dials-link" title="Save these as your defaults">Save</button>
          <button id="dials-reset" class="dials-link" title="Reset to defaults">Reset</button>
          <button id="dials-close" class="dials-link" title="Close">&#10005;</button>
        </div>
      </div>
      <div id="dials-list"></div>
    </div>

    <!-- Settings: system status (read-only) + editable note/task categories. -->
    <div id="settings-panel" class="hidden" aria-hidden="true">
      <div id="settings-head">
        <span class="dials-title">Settings</span>
        <div class="dials-head-actions">
          <button id="settings-save" class="dials-link" title="Save categories">Save</button>
          <button id="settings-close" class="dials-link" title="Close">&#10005;</button>
        </div>
      </div>
      <div id="settings-body">
        <div class="settings-label">Note &amp; Task Categories</div>
        <div id="cats-list"></div>
        <div id="cats-add-row">
          <input id="cats-add-input" type="text" placeholder="Add a category&hellip;" />
          <button id="cats-add-btn" class="dials-link">Add</button>
        </div>
        <div class="settings-hint">
          Saved to jarvis_config.json. New categories apply to JARVIS&rsquo;s
          tools after a restart.
        </div>
        <div class="settings-label">Integrations</div>
        <div id="diag-list"></div>
      </div>
    </div>

    <div id="transcript">
      <div id="hud" aria-hidden="true">
        <div class="hud-ring hud-ring-outer"></div>
        <div class="hud-ring hud-ring-mid"></div>
        <div class="hud-ring hud-ring-inner"></div>
        <div class="hud-core"></div>
        <div class="hud-label">J·A·R·V·I·S</div>
      </div>
    </div>

    <div id="status">Idle</div>

    <!-- Shown once a screenshot is captured; cleared on send or the ✕. -->
    <div id="attached-image-row" class="hidden" aria-hidden="true">
      <img id="attached-image-thumb" alt="Attached screenshot" />
      <span class="attached-image-label">Screenshot attached</span>
      <button id="attached-image-remove" class="icon-btn" title="Remove screenshot">&#10005;</button>
    </div>

    <div id="input-row">
      <textarea id="entry" placeholder="Ask JARVIS…" rows="1"></textarea>
      <button id="camera-btn" class="icon-btn" title="Capture a screen region">&#128247;</button>
      <button id="speak-btn" class="icon-btn" title="Speak replies">&#128263;</button>
      <button id="mic-btn" class="icon-btn" title="Voice input">&#127908;</button>
      <button id="send-btn" class="icon-btn" title="Send">&#10148;</button>
    </div>

    <!-- HUD frame: glowing corner brackets with node dots + ambient scan sweep.
         Decorative only — pointer-events: none so it never blocks the UI. -->
    <div id="hud-frame" aria-hidden="true">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <span class="scan-sweep"></span>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
